<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Скачать файлы</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>📥 Скачать файлы</h1>
        <p>Доступные для скачивания файлы</p>
      </div>

      <div class="content">
        <div class="files-list">
          {% for file in files %}
          <div class="file-item">
            <div class="file-icon">📄</div>
            <div class="file-info">
              <h3>{{ file.name }}</h3>
              <p>{{ file.description }}</p>
              <small>Размер: {{ file.size }}</small>
            </div>
            <a href="{{ file.url }}" class="download-btn" download>Скачать</a>
          </div>
          {% endfor %}
        </div>

        <div class="card">
          <a href="/" class="back-link">← Назад на главную</a>
        </div>
      </div>
    </div>
  </body>
</html>
