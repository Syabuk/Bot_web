<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0088cc" />
    <title>{% block title %}Telegram MiniWeb Blog{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    {% block extra_css %}{% endblock %}
  </head>
  <body>
    <div class="app-container">
      <!-- Мобильное меню -->
      <nav class="mobile-nav">
        <div class="nav-brand">
          <span class="brand-icon">📱</span>
          <span class="brand-name">MiniWeb Blog</span>
        </div>
        <button class="menu-toggle" id="menuToggle">☰</button>
      </nav>

      <!-- Боковое меню -->
      <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <h3>📚 Меню</h3>
          <button class="close-menu" id="closeMenu">✕</button>
        </div>
        <ul class="sidebar-menu">
          <li><a href="/" class="menu-link">🏠 Главная</a></li>
          <li><a href="/files" class="menu-link">📥 Файлы</a></li>
          <li>
            <a href="#" class="menu-link" id="refreshLink">🔄 Обновить</a>
          </li>
          <li><a href="#" class="menu-link" id="closeLink">❌ Закрыть</a></li>
        </ul>
        <div class="sidebar-footer">
          <p>Версия 1.0.0</p>
        </div>
      </div>

      <!-- Основной контент -->
      <main class="main-content">{% block content %}{% endblock %}</main>

      <!-- Оверлей для меню -->
      <div class="overlay" id="overlay"></div>
    </div>

    <script src="/static/js/main.js"></script>
    {% block extra_js %}{% endblock %}
  </body>
</html>
